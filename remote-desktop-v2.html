<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC远程桌面 - 屏幕共享端 v2</title>
    <script src="config-manager.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .config-section {
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }

        .config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .input-group input {
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #4CAF50;
        }

        .button-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 150px;
        }

        .btn-primary {
            background: #4CAF50;
            color: white;
        }

        .btn-primary:hover {
            background: #45a049;
        }

        .btn-danger {
            background: #f44336;
            color: white;
        }

        .btn-danger:hover {
            background: #d32f2f;
        }

        .btn-secondary {
            background: #2196F3;
            color: white;
        }

        .btn-secondary:hover {
            background: #1976D2;
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .video-section {
            padding: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .video-container {
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .video-container h3 {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 5px;
            z-index: 10;
        }

        video {
            width: 100%;
            height: 300px;
            object-fit: contain;
        }

        .connection-id {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
        }

        .connection-id h3 {
            color: #1976d2;
            margin-bottom: 10px;
        }

        .connection-id code {
            background: white;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
        }

        .logs {
            background: #263238;
            color: #fff;
            padding: 20px;
            border-radius: 8px;
            height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }

        .log-entry {
            margin: 5px 0;
            padding: 2px 0;
        }

        .log-entry.error {
            color: #ff5252;
        }

        .log-entry.success {
            color: #4caf50;
        }

        .log-entry.warning {
            color: #ff9800;
        }

        .status-section {
            padding: 30px;
            background: #f8f9fa;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            margin: 5px 0;
            background: white;
            border-radius: 8px;
            border-left: 4px solid #4CAF50;
        }

        .status-item.error {
            border-left-color: #f44336;
        }

        .status-item.warning {
            border-left-color: #ff9800;
        }

        .status-item.success {
            border-left-color: #4CAF50;
        }

        @media (max-width: 768px) {
            .video-section {
                grid-template-columns: 1fr;
            }
            
            .config-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🖥️ WebRTC远程桌面 v2</h1>
            <p>屏幕共享端 - 使用WebSocket信令服务器</p>
        </div>

        <div class="config-section">
            <h3>🔧 服务器配置</h3>
            <div class="config-grid">
                <div class="input-group">
                    <label for="signalingServer">信令服务器</label>
                    <input type="text" id="signalingServer" placeholder="ws://localhost:8080" value="ws://localhost:8080">
                </div>
                <div class="input-group" style="display: none;">
                    <label for="stunServer">STUN服务器</label>
                    <input type="text" id="stunServer"  >
                </div>
                <div class="input-group" style="display: none;">
                    <label for="turnServer">TURN服务器</label>
                    <input type="text" id="turnServer"  >
                </div>
                <div class="input-group" style="display: none;">
                    <label for="turnUsername">TURN用户名</label>
                    <input type="text" id="turnUsername" placeholder="用户名"  >
                </div>
                <div class="input-group" style="display: none;">
                    <label for="turnPassword">TURN密码</label>
                    <input type="password" id="turnPassword" placeholder="密码"  >
                </div>
            </div>

            <div class="button-group">
                <button class="btn btn-primary" id="startShareBtn" onclick="startScreenShare()">🚀 开始屏幕共享</button>
                <button class="btn btn-danger" id="stopShareBtn" onclick="stopScreenShare()" disabled>⏹️ 停止共享</button>
                <button class="btn btn-secondary" onclick="copyConnectionId()">📋 复制连接ID</button>
            </div>

            <div class="connection-id" id="connectionIdSection" style="display: none;">
                <h3>📱 连接ID</h3>
                <p>将此ID发送给需要观看的用户：</p>
                <code id="connectionId"></code>
            </div>
        </div>

        <div class="video-section">
            <div class="video-container">
                <h3>📺 本地屏幕预览</h3>
                <video id="localVideo" autoplay muted></video>
            </div>
            <div class="video-container">
                <h3>🔗 连接日志</h3>
                <div class="logs" id="logs"></div>
            </div>
        </div>

        <div class="status-section">
            <h3>📊 连接状态</h3>
            <div id="statusContainer">
                <div class="status-item">
                    <span>🔴</span>
                    <span>等待开始屏幕共享...</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let localStream = null;
        let peerConnections = new Map(); // 支持多个观看者
        let signalingSocket = null;
        let roomId = null;
        let isSharing = false;

        function log(message, type = 'info') {
            const logs = document.getElementById('logs');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logs.appendChild(entry);
            logs.scrollTop = logs.scrollHeight;
        }

        function updateStatus(message, type = 'info') {
            const container = document.getElementById('statusContainer');
            const statusItem = document.createElement('div');
            statusItem.className = `status-item ${type}`;
            
            const icon = type === 'error' ? '🔴' : type === 'success' ? '🟢' : '🟡';
            statusItem.innerHTML = `<span>${icon}</span><span>${message}</span>`;
            
            container.appendChild(statusItem);
        }

        // 获取并判断 WebRTC 连接模式
        async function checkConnectionType(pc, viewerId = '') {
            try {
                const stats = await pc.getStats();
                let localCandidateType = '';
                let remoteCandidateType = '';

                stats.forEach(report => {
                    // 找到被选中的候选者对
                    if (report.type === 'candidate-pair' && report.nominated) {
                        const localCandidate = stats.get(report.localCandidateId);
                        const remoteCandidate = stats.get(report.remoteCandidateId);

                        if (localCandidate) localCandidateType = localCandidate.candidateType;
                        if (remoteCandidate) remoteCandidateType = remoteCandidate.candidateType;
                    }
                });

                let connectionMode = '未知';
                if (localCandidateType === 'relay' || remoteCandidateType === 'relay') {
                    connectionMode = '🌐 中继服务器转发 (TURN)';
                } else if (localCandidateType === 'srflx' || remoteCandidateType === 'srflx' || localCandidateType === 'prflx' || remoteCandidateType === 'prflx') {
                    connectionMode = '⚡ NAT穿透直连 (STUN)';
                } else if (localCandidateType === 'host' && remoteCandidateType === 'host') {
                    connectionMode = '🏠 局域网直连 (Host)';
                }

                if (connectionMode !== '未知') {
                    const msg = viewerId ? `与观看者 ${viewerId} 的连接模式: ${connectionMode}` : `连接模式: ${connectionMode}`;
                    log(msg, 'success');
                    updateStatus(msg, 'success');
                }
            } catch (err) {
                log(`获取连接模式失败: ${err.message}`, 'error');
            }
        }

        function generateRoomId() {
            return Math.random().toString(36).substr(2, 9).toUpperCase();
        }

        function getIceServers() {
            // 优先使用配置管理器的配置
            if (window.configManager && window.configManager.config) {
                return window.configManager.getIceServers();
            }
            
            // 回退到表单输入
            const stunServer = document.getElementById('stunServer').value;
            const turnServer = document.getElementById('turnServer').value;
            const turnUsername = document.getElementById('turnUsername').value;
            const turnPassword = document.getElementById('turnPassword').value;

            const iceServers = [];
            
            if (stunServer) {
                iceServers.push({ urls: stunServer });
            }
            
            if (turnServer && turnUsername && turnPassword) {
                iceServers.push({
                    urls: turnServer,
                    username: turnUsername,
                    credential: turnPassword
                });
            }

            return iceServers;
        }

        async function connectSignaling() {
            // 优先使用配置管理器的配置
            let signalingUrl = document.getElementById('signalingServer').value;
            if (window.configManager && window.configManager.config) {
                signalingUrl = window.configManager.get('signaling.url') || signalingUrl;
            }
            
            return new Promise((resolve, reject) => {
                signalingSocket = new WebSocket(signalingUrl);
                
                signalingSocket.onopen = () => {
                    log('信令服务器连接成功', 'success');
                    resolve();
                };
                
                signalingSocket.onerror = (error) => {
                    log('信令服务器连接失败', 'error');
                    reject(error);
                };
                
                signalingSocket.onmessage = (event) => {
                    const message = JSON.parse(event.data);
                    handleSignalingMessage(message);
                };
                
                signalingSocket.onclose = () => {
                    log('信令服务器连接已断开', 'warning');
                };
            });
        }

        function handleSignalingMessage(message) {
            log(`收到信令消息: ${message.type}`, 'info');
            
            switch (message.type) {
                case 'connected':
                    log(`客户端ID: ${message.clientId}`, 'success');
                    break;
                    
                case 'room-created':
                    roomId = message.roomId;
                    document.getElementById('connectionId').textContent = roomId;
                    document.getElementById('connectionIdSection').style.display = 'block';
                    log(`房间已创建: ${roomId}`, 'success');
                    updateStatus('房间已创建，等待观看者连接', 'success');
                    break;
                    
                case 'offer':
                    handleOffer(message);
                    break;
                    
                case 'ice-candidate':
                    handleIceCandidate(message);
                    break;
                    
                case 'viewer-connected':
                    log('观看者已连接', 'success');
                    updateStatus('观看者已连接，正在传输屏幕', 'success');
                    break;
                    
                case 'error':
                    log(`错误: ${message.message}`, 'error');
                    updateStatus(`错误: ${message.message}`, 'error');
                    break;
            }
        }

        async function handleOffer(message) {
            try {
                log(`处理来自 ${message.from} 的连接请求`, 'info');
                
                // 创建新的RTCPeerConnection
                const iceServers = getIceServers();
                const peerConnection = new RTCPeerConnection({ iceServers });
                peerConnections.set(message.from, peerConnection);

                // 添加本地流
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });

                // ICE候选者处理
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        signalingSocket.send(JSON.stringify({
                            type: 'ice-candidate',
                            candidate: event.candidate,
                            targetId: message.from
                        }));
                        log('发送ICE候选者', 'info');
                    }
                };

                // 连接状态监控
                peerConnection.onconnectionstatechange = () => {
                    log(`与 ${message.from} 的连接状态: ${peerConnection.connectionState}`, 'info');
                    
                    if (peerConnection.connectionState === 'connected') {
                        updateStatus(`观看者 ${message.from} 已连接`, 'success');
                        
                        // 延迟1秒获取连接模式（确保ICE candidate pair已经完全确认）
                        setTimeout(() => {
                            checkConnectionType(peerConnection, message.from);
                        }, 1000);
                        
                    } else if (peerConnection.connectionState === 'disconnected' || 
                               peerConnection.connectionState === 'failed') {
                        peerConnections.delete(message.from);
                        updateStatus(`观看者 ${message.from} 已断开`, 'warning');
                    }
                };

                // 设置远程描述
                await peerConnection.setRemoteDescription(new RTCSessionDescription(message.offer));

                // 创建应答
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);

                // 发送应答
                signalingSocket.send(JSON.stringify({
                    type: 'answer',
                    answer: answer,
                    targetId: message.from
                }));

                log(`已发送连接应答给 ${message.from}`, 'success');

            } catch (error) {
                log(`处理连接请求失败: ${error.message}`, 'error');
            }
        }

        async function handleIceCandidate(message) {
            const peerConnection = peerConnections.get(message.from);
            if (peerConnection) {
                try {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(message.candidate));
                    log('添加ICE候选者', 'info');
                } catch (error) {
                    log(`添加ICE候选者失败: ${error.message}`, 'error');
                }
            }
        }

        // 检查是否支持屏幕共享
        function checkScreenShareSupport() {
            // 检查浏览器支持
            if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
                return {
                    supported: false,
                    reason: '浏览器不支持屏幕共享API，请使用Chrome 72+、Firefox 66+或Edge 79+'
                };
            }

            // 检查安全上下文
            if (!window.isSecureContext) {
                return {
                    supported: false,
                    reason: '屏幕共享需要安全上下文（HTTPS或localhost）'
                };
            }

            return { supported: true };
        }

        async function startScreenShare() {
            try {
                log('开始获取屏幕共享权限...', 'info');
                
                // 检查屏幕共享支持
                const supportCheck = checkScreenShareSupport();
                if (!supportCheck.supported) {
                    throw new Error(supportCheck.reason);
                }
                
                // 连接信令服务器
                await connectSignaling();
                
                // 获取屏幕共享流
                let videoConstraints = {
                    video: {
                        width: { ideal: 1920 },
                        height: { ideal: 1080 },
                        frameRate: { ideal: 30 }
                    },
                    audio: true
                };
                
                // 使用配置管理器的视频配置
                if (window.configManager && window.configManager.config) {
                    videoConstraints = window.configManager.getVideoConstraints();
                }
                
                log('正在请求屏幕共享权限...', 'info');
                localStream = await navigator.mediaDevices.getDisplayMedia(videoConstraints);

                // 显示本地预览
                const localVideo = document.getElementById('localVideo');
                localVideo.srcObject = localStream;

                // 生成房间ID并创建房间
                const newRoomId = generateRoomId();
                signalingSocket.send(JSON.stringify({
                    type: 'create-room',
                    roomId: newRoomId
                }));

                // 更新UI状态
                document.getElementById('startShareBtn').disabled = true;
                document.getElementById('stopShareBtn').disabled = false;
                isSharing = true;

                log('屏幕共享已开始', 'success');

                // 监听流结束事件
                localStream.getVideoTracks()[0].addEventListener('ended', () => {
                    log('用户停止了屏幕共享', 'warning');
                    stopScreenShare();
                });

            } catch (error) {
                log(`启动屏幕共享失败: ${error.message}`, 'error');
                updateStatus(`启动失败: ${error.message}`, 'error');
            }
        }

        function stopScreenShare() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }

            // 关闭所有peer连接
            peerConnections.forEach((pc, id) => {
                pc.close();
            });
            peerConnections.clear();

            if (signalingSocket) {
                signalingSocket.close();
                signalingSocket = null;
            }

            const localVideo = document.getElementById('localVideo');
            localVideo.srcObject = null;

            document.getElementById('startShareBtn').disabled = false;
            document.getElementById('stopShareBtn').disabled = true;
            document.getElementById('connectionIdSection').style.display = 'none';
            
            isSharing = false;
            roomId = null;

            log('屏幕共享已停止', 'warning');
            updateStatus('屏幕共享已停止', 'warning');
        }

        function copyConnectionId() {
            if (roomId) {
                navigator.clipboard.writeText(roomId).then(() => {
                    log('连接ID已复制到剪贴板', 'success');
                    updateStatus('连接ID已复制到剪贴板', 'success');
                });
            }
        }

        // 页面卸载时清理资源
        window.addEventListener('beforeunload', () => {
            if (isSharing) {
                stopScreenShare();
            }
        });

        // 页面加载时检查环境
        function initializeApp() {
            log('WebRTC远程桌面系统 v2 已就绪', 'success');
            
            // 检查屏幕共享支持
            const supportCheck = checkScreenShareSupport();
            if (!supportCheck.supported) {
                log(`⚠️ ${supportCheck.reason}`, 'error');
                updateStatus(supportCheck.reason, 'error');
                
                // 显示解决方案
                if (supportCheck.reason.includes('安全上下文')) {
                    log('💡 解决方案:', 'warning');
                    log('1. 使用 https:// 协议访问', 'warning');
                    log('2. 或使用 localhost 或 127.0.0.1 访问', 'warning');
                    log('3. 当前地址: ' + window.location.href, 'info');
                    
                    // 提供localhost链接
                    const currentUrl = new URL(window.location.href);
                    const localhostUrl = `http://localhost:${currentUrl.port}${currentUrl.pathname}`;
                    log(`🔗 建议访问: ${localhostUrl}`, 'success');
                }
                
                // 禁用开始按钮
                document.getElementById('startShareBtn').disabled = true;
                document.getElementById('startShareBtn').textContent = '❌ 不支持屏幕共享';
            } else {
                log('✅ 屏幕共享API支持正常', 'success');
                log('🔒 安全上下文检查通过', 'success');
                log('请配置服务器信息，然后点击"开始屏幕共享"', 'info');
                updateStatus('系统就绪，可以开始屏幕共享', 'success');
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(initializeApp, 100);
        });
    </script>
</body>
</html>
