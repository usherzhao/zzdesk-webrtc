<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC配置编辑器</title>
    <script src="config-manager.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #FF9800, #F57C00);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .config-section {
            padding: 30px;
        }

        .config-group {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #FF9800;
        }

        .config-group h3 {
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .config-group .description {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 15px;
            font-style: italic;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }

        .input-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .input-group input, .input-group textarea {
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .input-group input:focus, .input-group textarea:focus {
            outline: none;
            border-color: #FF9800;
        }

        .input-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .array-input {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .array-input input {
            flex: 1;
        }

        .btn-small {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-add {
            background: #4CAF50;
            color: white;
        }

        .btn-remove {
            background: #f44336;
            color: white;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 150px;
        }

        .btn-primary {
            background: #FF9800;
            color: white;
        }

        .btn-primary:hover {
            background: #F57C00;
        }

        .btn-secondary {
            background: #2196F3;
            color: white;
        }

        .btn-secondary:hover {
            background: #1976D2;
        }

        .btn-success {
            background: #4CAF50;
            color: white;
        }

        .btn-success:hover {
            background: #45a049;
        }

        .status-message {
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            display: none;
        }

        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .json-preview {
            background: #263238;
            color: #fff;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚙️ WebRTC配置编辑器</h1>
            <p>管理您的WebRTC远程桌面配置</p>
        </div>

        <div class="config-section">
            <div id="statusMessage" class="status-message"></div>

            <!-- 信令服务器配置 -->
            <div class="config-group">
                <h3>🔗 信令服务器</h3>
                <div class="description">WebSocket信令服务器地址</div>
                <div class="input-group">
                    <label for="signalingUrl">服务器地址</label>
                    <input type="text" id="signalingUrl" placeholder="wss://your-domain.com:8080">
                </div>
            </div>

            <!-- STUN服务器配置 -->
            <div class="config-group">
                <h3>🌐 STUN服务器</h3>
                <div class="description">STUN服务器列表，用于NAT穿透</div>
                <div id="stunServers">
                    <!-- 动态生成 -->
                </div>
                <button class="btn-small btn-add" onclick="addStunServer()">➕ 添加STUN服务器</button>
            </div>

            <!-- TURN服务器配置 -->
            <div class="config-group">
                <h3>🔄 TURN服务器</h3>
                <div class="description">TURN服务器配置，用于中继连接</div>
                <div class="input-group">
                    <label for="turnServer">服务器地址</label>
                    <input type="text" id="turnServer" placeholder="turn:your-server:3478">
                </div>
                <div class="input-group">
                    <label for="turnUsername">用户名</label>
                    <input type="text" id="turnUsername" placeholder="用户名">
                </div>
                <div class="input-group">
                    <label for="turnPassword">密码</label>
                    <input type="password" id="turnPassword" placeholder="密码">
                </div>
            </div>

            <!-- WebRTC配置 -->
            <div class="config-group">
                <h3>🔧 WebRTC配置</h3>
                <div class="description">WebRTC连接配置</div>
                <div class="input-group">
                    <label for="iceCandidatePoolSize">ICE候选者池大小</label>
                    <input type="number" id="iceCandidatePoolSize" min="0" max="255" value="10">
                </div>
                <div class="input-group">
                    <label for="iceTransportPolicy">ICE传输策略</label>
                    <select id="iceTransportPolicy">
                        <option value="all">all - 使用所有候选者</option>
                        <option value="relay">relay - 仅使用中继候选者</option>
                    </select>
                </div>
            </div>

            <!-- 视频配置 -->
            <div class="config-group">
                <h3>📺 视频配置</h3>
                <div class="description">视频质量配置</div>
                <div class="input-group">
                    <label for="videoWidth">视频宽度</label>
                    <input type="number" id="videoWidth" min="640" max="3840" value="1920">
                </div>
                <div class="input-group">
                    <label for="videoHeight">视频高度</label>
                    <input type="number" id="videoHeight" min="480" max="2160" value="1080">
                </div>
                <div class="input-group">
                    <label for="videoFrameRate">帧率</label>
                    <input type="number" id="videoFrameRate" min="15" max="60" value="30">
                </div>
            </div>

            <!-- UI配置 -->
            <div class="config-group">
                <h3>🎨 界面配置</h3>
                <div class="description">界面配置选项</div>
                <div class="input-group">
                    <label>
                        <input type="checkbox" id="autoConnect"> 自动连接
                    </label>
                </div>
                <div class="input-group">
                    <label>
                        <input type="checkbox" id="showDebugLogs" checked> 显示调试日志
                    </label>
                </div>
                <div class="input-group">
                    <label for="theme">主题</label>
                    <select id="theme">
                        <option value="default">默认</option>
                        <option value="dark">深色</option>
                        <option value="light">浅色</option>
                    </select>
                </div>
            </div>

            <div class="button-group">
                <button class="btn btn-primary" onclick="saveConfig()">💾 保存配置</button>
                <button class="btn btn-secondary" onclick="loadConfig()">🔄 重新加载</button>
                <button class="btn btn-success" onclick="exportConfig()">📤 导出配置</button>
            </div>

            <!-- JSON预览 -->
            <div class="config-group">
                <h3>📋 配置预览</h3>
                <div class="description">当前配置的JSON格式预览</div>
                <div class="json-preview" id="jsonPreview"></div>
            </div>
        </div>
    </div>

    <script>
        let currentConfig = {};

        function showStatus(message, type = 'success') {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.className = `status-message ${type}`;
            statusEl.style.display = 'block';
            
            setTimeout(() => {
                statusEl.style.display = 'none';
            }, 3000);
        }

        function addStunServer(value = '') {
            const container = document.getElementById('stunServers');
            const div = document.createElement('div');
            div.className = 'array-input';
            div.innerHTML = `
                <input type="text" placeholder="stun:server:port" value="${value}">
                <button class="btn-small btn-remove" onclick="removeStunServer(this)">❌</button>
            `;
            container.appendChild(div);
            updatePreview();
        }

        function removeStunServer(button) {
            button.parentElement.remove();
            updatePreview();
        }

        function collectFormData() {
            // 收集STUN服务器
            const stunInputs = document.querySelectorAll('#stunServers input');
            const stunServers = Array.from(stunInputs)
                .map(input => input.value.trim())
                .filter(value => value);

            return {
                signaling: {
                    url: document.getElementById('signalingUrl').value,
                    description: "WebSocket信令服务器地址"
                },
                stun: {
                    servers: stunServers,
                    description: "STUN服务器列表，用于NAT穿透"
                },
                turn: {
                    server: document.getElementById('turnServer').value,
                    username: document.getElementById('turnUsername').value,
                    password: document.getElementById('turnPassword').value,
                    description: "TURN服务器配置，用于中继连接"
                },
                webrtc: {
                    iceCandidatePoolSize: parseInt(document.getElementById('iceCandidatePoolSize').value),
                    iceTransportPolicy: document.getElementById('iceTransportPolicy').value,
                    description: "WebRTC连接配置"
                },
                video: {
                    width: parseInt(document.getElementById('videoWidth').value),
                    height: parseInt(document.getElementById('videoHeight').value),
                    frameRate: parseInt(document.getElementById('videoFrameRate').value),
                    description: "视频质量配置"
                },
                ui: {
                    autoConnect: document.getElementById('autoConnect').checked,
                    showDebugLogs: document.getElementById('showDebugLogs').checked,
                    theme: document.getElementById('theme').value,
                    description: "界面配置选项"
                }
            };
        }

        function updatePreview() {
            const config = collectFormData();
            document.getElementById('jsonPreview').textContent = JSON.stringify(config, null, 2);
        }

        function fillForm(config) {
            document.getElementById('signalingUrl').value = config.signaling?.url || '';
            document.getElementById('turnServer').value = config.turn?.server || '';
            document.getElementById('turnUsername').value = config.turn?.username || '';
            document.getElementById('turnPassword').value = config.turn?.password || '';
            document.getElementById('iceCandidatePoolSize').value = config.webrtc?.iceCandidatePoolSize || 10;
            document.getElementById('iceTransportPolicy').value = config.webrtc?.iceTransportPolicy || 'all';
            document.getElementById('videoWidth').value = config.video?.width || 1920;
            document.getElementById('videoHeight').value = config.video?.height || 1080;
            document.getElementById('videoFrameRate').value = config.video?.frameRate || 30;
            document.getElementById('autoConnect').checked = config.ui?.autoConnect || false;
            document.getElementById('showDebugLogs').checked = config.ui?.showDebugLogs !== false;
            document.getElementById('theme').value = config.ui?.theme || 'default';

            // 清空并重新添加STUN服务器
            document.getElementById('stunServers').innerHTML = '';
            const stunServers = config.stun?.servers || ['stun:stun.l.google.com:19302'];
            stunServers.forEach(server => addStunServer(server));

            updatePreview();
        }

        async function loadConfig() {
            try {
                if (window.configManager) {
                    const config = await window.configManager.loadConfig();
                    currentConfig = config;
                    fillForm(config);
                    showStatus('配置加载成功！', 'success');
                } else {
                    showStatus('配置管理器未加载', 'error');
                }
            } catch (error) {
                showStatus(`加载配置失败: ${error.message}`, 'error');
            }
        }

        function saveConfig() {
            try {
                const config = collectFormData();
                const configJson = JSON.stringify(config, null, 2);
                
                // 创建下载链接
                const blob = new Blob([configJson], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'config.json';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                showStatus('配置已保存到下载文件夹！', 'success');
            } catch (error) {
                showStatus(`保存配置失败: ${error.message}`, 'error');
            }
        }

        function exportConfig() {
            try {
                const config = collectFormData();
                const configJson = JSON.stringify(config, null, 2);
                
                navigator.clipboard.writeText(configJson).then(() => {
                    showStatus('配置已复制到剪贴板！', 'success');
                }).catch(() => {
                    // 回退方案
                    const textarea = document.createElement('textarea');
                    textarea.value = configJson;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    showStatus('配置已复制到剪贴板！', 'success');
                });
            } catch (error) {
                showStatus(`导出配置失败: ${error.message}`, 'error');
            }
        }

        // 监听表单变化，实时更新预览
        document.addEventListener('input', updatePreview);
        document.addEventListener('change', updatePreview);

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', async () => {
            await loadConfig();
        });
    </script>
</body>
</html>
