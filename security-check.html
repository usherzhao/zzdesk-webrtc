<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC安全上下文检查工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #FF5722, #E64A19);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .check-section {
            padding: 30px;
        }

        .check-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #ccc;
        }

        .check-item.success {
            border-left-color: #4CAF50;
            background: #e8f5e8;
        }

        .check-item.error {
            border-left-color: #f44336;
            background: #ffeaea;
        }

        .check-item.warning {
            border-left-color: #ff9800;
            background: #fff3e0;
        }

        .check-item h3 {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .check-item p {
            margin-bottom: 10px;
            line-height: 1.6;
        }

        .solution {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .solution h4 {
            color: #1976d2;
            margin-bottom: 10px;
        }

        .solution ul {
            margin-left: 20px;
        }

        .solution li {
            margin-bottom: 5px;
        }

        .url-info {
            background: #263238;
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            margin: 10px 0;
        }

        .btn {
            display: inline-block;
            padding: 12px 25px;
            background: #2196F3;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.3s;
            margin: 5px;
        }

        .btn:hover {
            background: #1976D2;
        }

        .btn-success {
            background: #4CAF50;
        }

        .btn-success:hover {
            background: #45a049;
        }

        .status-icon {
            font-size: 1.5em;
        }

        .test-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .test-result {
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
            font-family: 'Courier New', monospace;
        }

        .test-result.success {
            background: #d4edda;
            color: #155724;
        }

        .test-result.error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔒 WebRTC安全上下文检查</h1>
            <p>诊断屏幕共享API兼容性问题</p>
        </div>

        <div class="check-section">
            <div id="protocolCheck" class="check-item">
                <h3><span class="status-icon">🔍</span>协议检查</h3>
                <p>检查当前访问协议是否支持屏幕共享...</p>
            </div>

            <div id="browserCheck" class="check-item">
                <h3><span class="status-icon">🌐</span>浏览器支持</h3>
                <p>检查浏览器是否支持屏幕共享API...</p>
            </div>

            <div id="secureContextCheck" class="check-item">
                <h3><span class="status-icon">🔐</span>安全上下文</h3>
                <p>检查是否在安全上下文中运行...</p>
            </div>

            <div id="permissionCheck" class="check-item">
                <h3><span class="status-icon">🎯</span>权限测试</h3>
                <p>测试屏幕共享权限获取...</p>
                <button class="btn" onclick="testScreenShare()">🧪 测试屏幕共享</button>
                <div id="testResult"></div>
            </div>

            <div class="test-section">
                <h3>📊 系统信息</h3>
                <div id="systemInfo"></div>
            </div>
        </div>
    </div>

    <script>
        function updateCheckItem(id, status, title, message, solution = null) {
            const item = document.getElementById(id);
            const icons = {
                success: '✅',
                error: '❌',
                warning: '⚠️',
                info: '🔍'
            };
            
            item.className = `check-item ${status}`;
            item.innerHTML = `
                <h3><span class="status-icon">${icons[status]}</span>${title}</h3>
                <p>${message}</p>
                ${solution ? `<div class="solution">${solution}</div>` : ''}
            `;
        }

        function checkProtocol() {
            const protocol = window.location.protocol;
            const hostname = window.location.hostname;
            
            let status, message, solution;
            
            if (protocol === 'https:') {
                status = 'success';
                message = `✅ 使用HTTPS协议 (${protocol})，支持屏幕共享`;
            } else if (hostname === 'localhost' || hostname === '127.0.0.1') {
                status = 'success';
                message = `✅ 使用localhost/127.0.0.1 (${hostname})，支持屏幕共享`;
            } else {
                status = 'error';
                message = `❌ 使用HTTP协议访问远程地址，不支持屏幕共享`;
                solution = `
                    <h4>解决方案:</h4>
                    <ul>
                        <li>使用HTTPS协议访问: <code>https://${hostname}${window.location.port ? ':' + window.location.port : ''}${window.location.pathname}</code></li>
                        <li>或配置SSL证书启用HTTPS</li>
                        <li>开发环境可使用localhost访问</li>
                    </ul>
                `;
            }
            
            updateCheckItem('protocolCheck', status, '协议检查', message, solution);
        }

        function checkBrowserSupport() {
            const userAgent = navigator.userAgent;
            let browserInfo = '未知浏览器';
            let supported = false;
            
            if (userAgent.includes('Chrome')) {
                const match = userAgent.match(/Chrome\/(\d+)/);
                const version = match ? parseInt(match[1]) : 0;
                browserInfo = `Chrome ${version}`;
                supported = version >= 72;
            } else if (userAgent.includes('Firefox')) {
                const match = userAgent.match(/Firefox\/(\d+)/);
                const version = match ? parseInt(match[1]) : 0;
                browserInfo = `Firefox ${version}`;
                supported = version >= 66;
            } else if (userAgent.includes('Safari') && !userAgent.includes('Chrome')) {
                const match = userAgent.match(/Version\/(\d+)/);
                const version = match ? parseInt(match[1]) : 0;
                browserInfo = `Safari ${version}`;
                supported = version >= 13;
            } else if (userAgent.includes('Edge')) {
                const match = userAgent.match(/Edg\/(\d+)/);
                const version = match ? parseInt(match[1]) : 0;
                browserInfo = `Edge ${version}`;
                supported = version >= 79;
            }
            
            const hasAPI = !!(navigator.mediaDevices && navigator.mediaDevices.getDisplayMedia);
            
            let status, message, solution;
            
            if (hasAPI && supported) {
                status = 'success';
                message = `✅ ${browserInfo} 支持屏幕共享API`;
            } else {
                status = 'error';
                message = `❌ ${browserInfo} 不支持或版本过低`;
                solution = `
                    <h4>解决方案:</h4>
                    <ul>
                        <li>升级到支持的浏览器版本:</li>
                        <li>• Chrome 72+ / Edge 79+</li>
                        <li>• Firefox 66+</li>
                        <li>• Safari 13+</li>
                    </ul>
                `;
            }
            
            updateCheckItem('browserCheck', status, '浏览器支持', message, solution);
        }

        function checkSecureContext() {
            const isSecure = window.isSecureContext;
            const protocol = window.location.protocol;
            const hostname = window.location.hostname;
            
            let status, message, solution;
            
            if (isSecure) {
                status = 'success';
                message = '✅ 运行在安全上下文中，可以使用屏幕共享API';
            } else {
                status = 'error';
                message = '❌ 不在安全上下文中，无法使用屏幕共享API';
                
                const currentPort = window.location.port;
                const localhostUrl = `http://localhost${currentPort ? ':' + currentPort : ''}${window.location.pathname}`;
                const httpsUrl = `https://${hostname}${currentPort ? ':' + currentPort : ''}${window.location.pathname}`;
                
                solution = `
                    <h4>解决方案:</h4>
                    <ul>
                        <li>方案1: 使用localhost访问</li>
                        <li><a href="${localhostUrl}" class="btn">🔗 使用localhost访问</a></li>
                        <li>方案2: 配置HTTPS</li>
                        <li><a href="${httpsUrl}" class="btn">🔒 尝试HTTPS访问</a></li>
                    </ul>
                    <div class="url-info">
                        当前地址: ${window.location.href}<br>
                        建议地址: ${localhostUrl}
                    </div>
                `;
            }
            
            updateCheckItem('secureContextCheck', status, '安全上下文', message, solution);
        }

        async function testScreenShare() {
            const resultDiv = document.getElementById('testResult');
            resultDiv.innerHTML = '<p>🧪 正在测试屏幕共享权限...</p>';
            
            try {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
                    throw new Error('浏览器不支持屏幕共享API');
                }
                
                if (!window.isSecureContext) {
                    throw new Error('不在安全上下文中，无法获取屏幕共享权限');
                }
                
                // 尝试获取屏幕共享权限
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: { width: 640, height: 480 },
                    audio: false
                });
                
                // 立即停止流
                stream.getTracks().forEach(track => track.stop());
                
                resultDiv.innerHTML = `
                    <div class="test-result success">
                        ✅ 屏幕共享测试成功！<br>
                        • 浏览器支持屏幕共享API<br>
                        • 安全上下文检查通过<br>
                        • 用户权限获取成功<br>
                        <br>
                        🎉 您可以正常使用WebRTC远程桌面系统！
                        <br><br>
                        <a href="remote-desktop-v2.html" class="btn btn-success">🚀 开始屏幕共享</a>
                    </div>
                `;
                
            } catch (error) {
                let errorMessage = error.message;
                let solution = '';
                
                if (error.name === 'NotAllowedError') {
                    errorMessage = '用户拒绝了屏幕共享权限';
                    solution = '请在浏览器弹窗中允许屏幕共享权限';
                } else if (error.name === 'NotSupportedError') {
                    errorMessage = '浏览器不支持屏幕共享';
                    solution = '请使用支持的浏览器版本';
                } else if (error.message.includes('安全上下文')) {
                    solution = '请使用HTTPS协议或localhost访问';
                }
                
                resultDiv.innerHTML = `
                    <div class="test-result error">
                        ❌ 屏幕共享测试失败<br>
                        错误: ${errorMessage}<br>
                        ${solution ? `解决方案: ${solution}` : ''}
                    </div>
                `;
            }
        }

        function displaySystemInfo() {
            const info = {
                '用户代理': navigator.userAgent,
                '当前URL': window.location.href,
                '协议': window.location.protocol,
                '主机名': window.location.hostname,
                '端口': window.location.port || '默认',
                '安全上下文': window.isSecureContext ? '是' : '否',
                '屏幕共享API': !!(navigator.mediaDevices && navigator.mediaDevices.getDisplayMedia) ? '支持' : '不支持',
                '语言': navigator.language,
                '平台': navigator.platform,
                '在线状态': navigator.onLine ? '在线' : '离线'
            };
            
            let infoHtml = '';
            for (const [key, value] of Object.entries(info)) {
                infoHtml += `<div class="url-info" style="margin: 5px 0;"><strong>${key}:</strong> ${value}</div>`;
            }
            
            document.getElementById('systemInfo').innerHTML = infoHtml;
        }

        // 页面加载时执行所有检查
        document.addEventListener('DOMContentLoaded', () => {
            checkProtocol();
            checkBrowserSupport();
            checkSecureContext();
            displaySystemInfo();
        });
    </script>
</body>
</html>
