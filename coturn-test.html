<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COTURN服务器测试工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .config-section {
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }

        .config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .input-group input {
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #4CAF50;
        }

        .button-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 150px;
        }

        .btn-primary {
            background: #4CAF50;
            color: white;
        }

        .btn-primary:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #2196F3;
            color: white;
        }

        .btn-secondary:hover {
            background: #1976D2;
            transform: translateY(-2px);
        }

        .btn-warning {
            background: #FF9800;
            color: white;
        }

        .btn-warning:hover {
            background: #F57C00;
            transform: translateY(-2px);
        }

        .results-section {
            padding: 30px;
            max-height: 500px;
            overflow-y: auto;
        }

        .result-item {
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid #4CAF50;
            background: #f1f8e9;
            animation: slideIn 0.3s ease-out;
        }

        .result-item.error {
            border-left-color: #f44336;
            background: #ffebee;
            color: #c62828;
        }

        .result-item.warning {
            border-left-color: #ff9800;
            background: #fff3e0;
            color: #ef6c00;
        }

        .result-item.success {
            border-left-color: #4caf50;
            background: #e8f5e9;
            color: #2e7d32;
        }

        .result-item .timestamp {
            font-size: 0.9em;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .result-item .message {
            font-weight: 500;
        }

        .candidate-info {
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            background: rgba(0,0,0,0.05);
            padding: 8px;
            border-radius: 4px;
            margin-top: 5px;
            word-break: break-all;
        }

        .summary {
            background: #e3f2fd;
            border: 2px solid #2196f3;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
        }

        .summary h3 {
            color: #1976d2;
            margin-bottom: 15px;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: white;
            border-radius: 8px;
        }

        .status-icon {
            font-size: 1.5em;
        }

        .clear-btn {
            background: #f44336;
            color: white;
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            float: right;
            margin-bottom: 20px;
        }

        .clear-btn:hover {
            background: #d32f2f;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔧 COTURN测试工具</h1>
            <p>测试您的STUN/TURN服务器是否正常工作</p>
        </div>

        <div class="config-section">
            <div class="config-grid">
                <div class="input-group">
                    <label for="serverIp">🌐 服务器IP地址</label>
                    <input type="text" id="serverIp" placeholder="例如: 192.168.1.100" value="">
                </div>
                <div class="input-group">
                    <label for="username">👤 用户名</label>
                    <input type="text" id="username" placeholder="TURN用户名" value="testuser">
                </div>
                <div class="input-group">
                    <label for="password">🔒 密码</label>
                    <input type="password" id="password" placeholder="TURN密码" value="testpass">
                </div>
            </div>

            <div class="button-group">
                <button class="btn btn-primary" onclick="testStun()">🎯 测试STUN</button>
                <button class="btn btn-secondary" onclick="testTurn()">🔄 测试TURN</button>
                <button class="btn btn-warning" onclick="testComplete()">🚀 完整测试</button>
            </div>
        </div>

        <div class="results-section">
            <button class="clear-btn" onclick="clearResults()">清空日志</button>
            <div id="results"></div>
            <div id="summary" style="display: none;"></div>
        </div>
    </div>

    <script>
        let testResults = {
            host: false,
            stun: false,
            turn: false
        };

        function log(message, type = 'info', candidateData = null) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `result-item ${type}`;
            
            const timestamp = new Date().toLocaleTimeString();
            let content = `
                <div class="timestamp">${timestamp}</div>
                <div class="message">${message}</div>
            `;
            
            if (candidateData) {
                content += `<div class="candidate-info">${candidateData}</div>`;
            }
            
            div.innerHTML = content;
            results.appendChild(div);
            results.scrollTop = results.scrollHeight;
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
            document.getElementById('summary').style.display = 'none';
            testResults = { host: false, stun: false, turn: false };
        }

        function getServerConfig() {
            const serverIp = document.getElementById('serverIp').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!serverIp) {
                log('❌ 请输入服务器IP地址', 'error');
                return null;
            }
            
            return { serverIp, username, password };
        }

        function showSummary() {
            const summary = document.getElementById('summary');
            summary.style.display = 'block';
            
            let summaryHtml = `
                <div class="summary">
                    <h3>📊 测试结果总结</h3>
                    <div class="status-grid">
                        <div class="status-item">
                            <span class="status-icon">${testResults.host ? '✅' : '❌'}</span>
                            <span>主机候选者 (Host)</span>
                        </div>
                        <div class="status-item">
                            <span class="status-icon">${testResults.stun ? '✅' : '❌'}</span>
                            <span>STUN服务器</span>
                        </div>
                        <div class="status-item">
                            <span class="status-icon">${testResults.turn ? '✅' : '❌'}</span>
                            <span>TURN服务器</span>
                        </div>
                    </div>
            `;
            
            if (testResults.stun && testResults.turn) {
                summaryHtml += '<p style="color: #4caf50; font-weight: bold; margin-top: 15px;">🎉 恭喜！您的COTURN服务器配置完全正确！</p>';
            } else if (testResults.stun) {
                summaryHtml += '<p style="color: #ff9800; font-weight: bold; margin-top: 15px;">⚠️ STUN工作正常，但TURN服务可能需要检查用户名密码配置</p>';
            } else {
                summaryHtml += '<p style="color: #f44336; font-weight: bold; margin-top: 15px;">❌ 服务器可能配置有误，请检查IP地址和防火墙设置</p>';
            }
            
            summaryHtml += '</div>';
            summary.innerHTML = summaryHtml;
        }

        async function testStun() {
            const config = getServerConfig();
            if (!config) return;
            
            log('🔍 开始测试STUN服务器...', 'info');
            
            const configuration = {
                iceServers: [
                    { urls: `stun:${config.serverIp}:3478` }
                ]
            };

            try {
                const pc = new RTCPeerConnection(configuration);
                let candidateCount = 0;
                
                pc.createDataChannel('test');
                
                pc.onicecandidate = (event) => {
                    if (event.candidate) {
                        candidateCount++;
                        const candidate = event.candidate.candidate;
                        log(`发现候选者 #${candidateCount}`, 'info', candidate);
                        
                        if (candidate.includes('host')) {
                            testResults.host = true;
                            log('✅ 发现主机候选者', 'success');
                        }
                        
                        if (candidate.includes('srflx')) {
                            testResults.stun = true;
                            log('✅ STUN服务器工作正常！发现服务器反射候选者', 'success');
                        }
                    } else {
                        log(`STUN测试完成，共发现 ${candidateCount} 个候选者`, 'info');
                        if (!testResults.stun) {
                            log('❌ 未发现STUN候选者，请检查服务器配置', 'error');
                        }
                        pc.close();
                    }
                };

                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                
                // 10秒后强制结束
                setTimeout(() => {
                    if (pc.connectionState !== 'closed') {
                        pc.close();
                        log('STUN测试超时结束', 'warning');
                    }
                }, 10000);
                
            } catch (error) {
                log(`❌ STUN测试失败: ${error.message}`, 'error');
            }
        }

        async function testTurn() {
            const config = getServerConfig();
            if (!config) return;
            
            if (!config.username || !config.password) {
                log('❌ 测试TURN服务器需要用户名和密码', 'error');
                return;
            }
            
            log('🔄 开始测试TURN服务器...', 'info');
            
            const configuration = {
                iceServers: [
                    {
                        urls: `turn:${config.serverIp}:3478`,
                        username: config.username,
                        credential: config.password
                    }
                ]
            };

            try {
                const pc = new RTCPeerConnection(configuration);
                let candidateCount = 0;
                
                pc.createDataChannel('test');
                
                pc.onicecandidate = (event) => {
                    if (event.candidate) {
                        candidateCount++;
                        const candidate = event.candidate.candidate;
                        log(`发现候选者 #${candidateCount}`, 'info', candidate);
                        
                        if (candidate.includes('host')) {
                            testResults.host = true;
                            log('✅ 发现主机候选者', 'success');
                        }
                        
                        if (candidate.includes('relay')) {
                            testResults.turn = true;
                            log('✅ TURN服务器工作正常！发现中继候选者', 'success');
                        }
                    } else {
                        log(`TURN测试完成，共发现 ${candidateCount} 个候选者`, 'info');
                        if (!testResults.turn) {
                            log('❌ 未发现TURN候选者，请检查用户名密码和服务器配置', 'error');
                        }
                        pc.close();
                    }
                };

                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                
                // 15秒后强制结束
                setTimeout(() => {
                    if (pc.connectionState !== 'closed') {
                        pc.close();
                        log('TURN测试超时结束', 'warning');
                    }
                }, 15000);
                
            } catch (error) {
                log(`❌ TURN测试失败: ${error.message}`, 'error');
            }
        }

        async function testComplete() {
            const config = getServerConfig();
            if (!config) return;
            
            clearResults();
            log('🚀 开始完整的COTURN服务器测试...', 'info');
            
            const configuration = {
                iceServers: [
                    { urls: `stun:${config.serverIp}:3478` },
                    {
                        urls: `turn:${config.serverIp}:3478`,
                        username: config.username,
                        credential: config.password
                    }
                ]
            };

            try {
                const pc = new RTCPeerConnection(configuration);
                let candidateCount = 0;
                
                pc.createDataChannel('test');
                
                pc.onicecandidate = (event) => {
                    if (event.candidate) {
                        candidateCount++;
                        const candidate = event.candidate.candidate;
                        
                        let candidateType = '未知';
                        let logType = 'info';
                        
                        if (candidate.includes('host')) {
                            candidateType = '主机候选者 (Host)';
                            testResults.host = true;
                            logType = 'success';
                        } else if (candidate.includes('srflx')) {
                            candidateType = 'STUN候选者 (Server Reflexive)';
                            testResults.stun = true;
                            logType = 'success';
                        } else if (candidate.includes('relay')) {
                            candidateType = 'TURN候选者 (Relay)';
                            testResults.turn = true;
                            logType = 'success';
                        }
                        
                        log(`#${candidateCount} ${candidateType}`, logType, candidate);
                        
                    } else {
                        log('=== ICE候选者收集完成 ===', 'info');
                        log(`总共发现 ${candidateCount} 个候选者`, 'info');
                        showSummary();
                        pc.close();
                    }
                };

                pc.onicegatheringstatechange = () => {
                    log(`ICE收集状态: ${pc.iceGatheringState}`, 'info');
                };

                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                
                // 20秒后强制结束
                setTimeout(() => {
                    if (pc.connectionState !== 'closed') {
                        pc.close();
                        log('完整测试超时结束', 'warning');
                        showSummary();
                    }
                }, 20000);
                
            } catch (error) {
                log(`❌ 完整测试失败: ${error.message}`, 'error');
            }
        }

        // 页面加载完成后的初始化
        window.onload = function() {
            log('🎯 COTURN测试工具已就绪', 'success');
            log('💡 请输入您的服务器配置信息，然后点击测试按钮', 'info');
        };
    </script>
</body>
</html>
